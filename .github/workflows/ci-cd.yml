name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-test-deploy:

    runs-on: ubuntu-latest

    steps:

      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install dvc mlflow pytest

      # 4. Copy requirements for Docker
      - name: Copy requirements for Docker
        run: |
          cp requirements.txt app/requirements.txt

      # 5. Build Docker image
      - name: Build Docker image
        run: |
          docker build -t solar-app ./app

      # 6. Run Docker container (test stage)
      - name: Run Docker container
        run: |
          docker run -d -p 8000:8000 \
            -e WEATHER_API_KEY=${{ secrets.WEATHER_API_KEY }} \
            --name solar-container \
            solar-app

      # 7. Login to ECR
      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
          docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      # 8. Push to ECR
      - name: Push to ECR
        run: |
          docker tag solar-app:latest \
            ${{ secrets.ECR_REGISTRY }}/mlops/solar-power-forecasting:latest
          docker push \
            ${{ secrets.ECR_REGISTRY }}/mlops/solar-power-forecasting:latest


      # 9. Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ubuntu
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
            docker login --username AWS \
            --password-stdin ${{ secrets.ECR_REGISTRY }}
            docker stop solar-container || true
            docker rm solar-container   || true
            docker system prune -a -f
            docker pull ${{ secrets.ECR_REGISTRY }}/mlops/solar-power-forecasting:latest
            docker run -d -p 8000:8000 -p 8501:8501 \
              -e WEATHER_API_KEY=${{ secrets.WEATHER_API_KEY }} \
              --name solar-container \
              --restart always \
              --log-driver=awslogs \
              --log-opt awslogs-region=eu-north-1 \
              --log-opt awslogs-group=/solar-app/container \
              --log-opt awslogs-stream=solar-container \
              ${{ secrets.ECR_REGISTRY }}/mlops/solar-power-forecasting:latest