name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-test-deploy:

    runs-on: ubuntu-latest

    steps:

      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Run tests
      - name: Run pytest
        run: |
          pytest tests/

      # 5. Run DVC pipeline (optional but good for demo)
      - name: Run DVC pipeline
        run: |
          pip install dvc
          dvc repro -f

      # 6. Build Docker image
      - name: Build Docker image
        run: |
          docker build -t solar-app ./app