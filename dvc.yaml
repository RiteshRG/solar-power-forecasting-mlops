stages:

  preprocess:
    cmd: python src/preprocess.py
    deps:
      - data/raw/Plant_1_Generation_Data.csv
      - data/raw/Plant_1_Weather_Sensor_Data.csv
      - src/preprocess.py
    outs:
      - data/processed/train.csv


  train:
    cmd: python src/train.py
    deps:
      - data/processed/train.csv
      - src/train.py
    outs: []   # MLflow stores model, NOT DVC


  register:
    cmd: python src/register.py
    deps:
      - src/register.py


  export_model:
    cmd: python src/export_model.py
    deps:
      - src/export_model.py
      - src/register.py
    outs:
      - app/model/model.pkl